name: Update F1 Data

on:
  schedule:
    # Lunes 10:00 UTC (~5am MX, tras fin de semana de carrera)
    - cron: "0 10 * * 1"
  workflow_dispatch: # permite correrlo manual desde GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root deps
        run: npm ci

      - name: Install ETL deps
        working-directory: etl
        run: npm ci

      - name: Download latest Jolpica dump
        working-directory: etl
        run: npm run download

      - name: Generate SQL from dump
        working-directory: etl
        run: npm run etl:dump

      - name: Generate enrich SQL (rivalries + records)
        working-directory: etl
        run: npm run etl:enrich

      - name: Clear remote D1 data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute f1-api-db --remote -y --command "UPDATE seasons SET champion_driver_id = NULL, champion_constructor_id = NULL; UPDATE circuits SET lap_record_driver_id = NULL;"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM translations; DELETE FROM rivalry_key_races; DELETE FROM rivalries; DELETE FROM records; DELETE FROM driver_standings; DELETE FROM constructor_standings; DELETE FROM qualifying; DELETE FROM results; DELETE FROM races; DELETE FROM seasons; DELETE FROM circuits; DELETE FROM constructors; DELETE FROM drivers;"

      - name: Apply SQL files to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: etl
        run: node scripts/apply-remote.mjs

      - name: Summary
        run: echo "✓ F1 data updated successfully at $(date -u)"