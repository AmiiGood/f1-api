name: Update F1 Data

on:
  schedule:
    # Lunes 10:00 UTC (~5am MX, tras fin de semana de carrera)
    - cron: "0 10 * * 1"
  workflow_dispatch:
    # permite correrlo manual desde GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root deps
        run: npm ci

      - name: Install ETL deps
        working-directory: etl
        run: npm ci

      - name: Download latest Jolpica dump
        working-directory: etl
        run: npm run download

      - name: Generate SQL from dump
        working-directory: etl
        run: npm run etl:dump

      - name: Generate enrich SQL (rivalries + records)
        working-directory: etl
        run: npm run etl:enrich

      - name: Clear remote D1 data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "→ UPDATE seasons"
          npx wrangler d1 execute f1-api-db --remote -y --command "UPDATE seasons SET champion_driver_id = NULL, champion_constructor_id = NULL;"
          echo "→ UPDATE circuits"
          npx wrangler d1 execute f1-api-db --remote -y --command "UPDATE circuits SET lap_record_driver_id = NULL;"
          echo "→ DELETE translations"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM translations;"
          echo "→ DELETE rivalry_key_races"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM rivalry_key_races;"
          echo "→ DELETE rivalries"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM rivalries;"
          echo "→ DELETE records"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM records;"
          echo "→ DELETE driver_standings"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM driver_standings;"
          echo "→ DELETE constructor_standings"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM constructor_standings;"
          echo "→ DELETE qualifying"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM qualifying;"
          echo "→ DELETE results"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM results;"
          echo "→ DELETE races"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM races;"
          echo "→ DELETE seasons"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM seasons;"
          echo "→ DELETE circuits"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM circuits;"
          echo "→ DELETE drivers"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM drivers;"
          echo "→ DELETE constructors"
          npx wrangler d1 execute f1-api-db --remote -y --command "DELETE FROM constructors;"

      - name: Apply SQL files to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: etl
        run: node scripts/apply-remote.mjs

      - name: Summary
        run: echo "✓ F1 data updated successfully at $(date -u)"

      - name: Install sharp (native deps)
        working-directory: etl
        run: npm install sharp --force

      - name: Restore asset cache
        uses: actions/cache@v4
        with:
          path: etl/dump/wikimedia-cache.json
          key: wikimedia-cache-v1
          restore-keys: wikimedia-cache-

      - name: Enrich with assets (Wikipedia/Wikidata images)
        working-directory: etl
        env:
          ASSETS_CDN_BASE: https://assets.sweetcode.app
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run etl:assets

      - name: Apply assets SQL to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute f1-api-db --remote -y
          --file="etl/output/99_assets.sql"
